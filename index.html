<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アラーム時計</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3152;
    --navy-light: #26456e;
    --accent: #4fc3f7;
    --accent-dim: #1e6e96;
    --alarm-red: #c62828;
    --alarm-red-light: #ef5350;
    --text: #cfe0f0;
    --text-dim: #5d7fa0;
    --panel-bg: rgba(12,22,40,0.98);
    --border: rgba(79,195,247,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
    transition: background 1.4s ease;
    position: relative;
  }
  body.alarm-on { background: #1a0000; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    transition: opacity 1.4s;
  }
  body.alarm-on::before { opacity: 0.25; }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
  }

  /* gear */
  #gear-btn {
    position: fixed;
    top: 20px; right: 24px;
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: color 0.25s, border-color 0.25s, background 0.25s, transform 0.45s, box-shadow 0.25s;
    z-index: 100;
  }
  #gear-btn:hover {
    color: #ffee00;
    border-color: rgba(255,238,0,0.6);
    background: rgba(255,238,0,0.1);
    box-shadow: 0 0 16px rgba(255,220,0,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: rotate(60deg);
  }
  #gear-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
  body.alarm-on #gear-btn { color: #ef9a9a; border-color: rgba(239,83,80,0.4); }

  /* clock */
  #clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  #time-display {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: clamp(68px, 13vw, 124px);
    color: var(--accent);
    letter-spacing: 0.06em;
    line-height: 1;
    text-shadow:
      0 0 15px rgba(255,238,0,0.8),
      0 0 45px rgba(255,210,0,0.45);
    transition: color 0.6s, text-shadow 0.6s;
    user-select: none;
  }
  body.alarm-on #time-display {
    color: var(--alarm-red-light);
    text-shadow: 0 0 40px rgba(239,83,80,0.5), 0 0 80px rgba(239,83,80,0.2);
    animation: flicker 1s infinite alternate;
  }
  @keyframes flicker {
    0%,82%,86%,92%,100% { opacity: 1; }
    84%,88% { opacity: 0.82; }
  }

  #date-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: #7a9fc0;
    letter-spacing: 0.22em;
  }

  #alarm-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 560px;
    min-height: 36px;
    align-items: center;
  }
  .alarm-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 5px 14px;
    letter-spacing: 0.12em;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .alarm-tag.firing {
    color: var(--alarm-red-light);
    border-color: rgba(239,83,80,0.6);
    background: rgba(239,83,80,0.08);
    animation: tag-blink 0.65s infinite alternate;
  }
  @keyframes tag-blink { from { opacity: 1; } to { opacity: 0.35; } }

  #stop-btn {
    margin-top: 8px;
    padding: 13px 56px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.18em;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    color: rgba(180,210,230,0.5);
    cursor: default;
    opacity: 1;
    pointer-events: none;
    transition: all 0.4s;
  }
  #stop-btn.active {
    opacity: 1;
    pointer-events: auto;
    color: var(--alarm-red-light);
    border-color: rgba(239,83,80,0.6);
    background: rgba(239,83,80,0.12);
    box-shadow: 0 2px 16px rgba(239,83,80,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
    cursor: pointer;
    animation: pulse-btn 1.1s infinite alternate;
  }
  #stop-btn.active:focus-visible {
    outline: 2px solid var(--alarm-red-light);
    outline-offset: 3px;
  }
  #stop-btn.stopped {
    opacity: 0.4;
    pointer-events: none;
    color: var(--text-dim);
    border-color: var(--border);
    cursor: default;
    animation: none;
  }
  @keyframes pulse-btn {
    from { box-shadow: 0 0 8px rgba(239,83,80,0.15); }
    to   { box-shadow: 0 0 28px rgba(239,83,80,0.55); }
  }

  /* 浮遊パーティクル */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: float-particle linear infinite;
  }
  @keyframes float-particle {
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
  }

  /* 流れ星 */
  .star-outer {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .star-inner {
    position: relative;
    width: 4px; height: 4px;
    animation: shoot-move linear forwards;
    opacity: 0;
  }
  .star-inner::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    box-shadow: 0 0 6px 2px rgba(255,240,180,0.55);
  }
  .star-inner::after {
    content: '';
    position: absolute;
    top: 50%;
    right: 4px;
    transform: translateY(-50%);
    width: var(--tail-len);
    height: 1.5px;
    background: linear-gradient(to left, rgba(255,240,180,0.5), transparent);
    border-radius: 1px;
  }
  @keyframes shoot-move {
    0%   { opacity: 0;   transform: translate(0, 0); }
    6%   { opacity: 1; }
    85%  { opacity: 0.9; }
    100% { opacity: 0;   transform: translate(var(--dist), 0); }
  }

  #overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #overlay.open { display: flex; }

  #settings-panel {
    background: rgba(20,45,75,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    width: min(460px, 92vw);
    padding: 26px 26px 22px;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  #panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.22em;
    color: var(--accent);
    margin-bottom: 20px;
  }

  #close-btn {
    position: absolute;
    top: 16px; right: 18px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
    padding: 4px;
  }
  #close-btn:hover { color: var(--text); }

  #alarm-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 14px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 2px;
  }
  #alarm-list::-webkit-scrollbar { width: 4px; }
  #alarm-list::-webkit-scrollbar-track { background: transparent; }
  #alarm-list::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 2px; }

  .alarm-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    animation: row-in 0.18s ease;
  }
  @keyframes row-in {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .alarm-row input[type="time"] {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    background: transparent;
    border: none;
    color: var(--text);
    outline: none;
    letter-spacing: 0.08em;
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }
  .alarm-row input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6) sepia(1) saturate(2) hue-rotate(175deg);
    cursor: pointer;
  }

  .alarm-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.05em;
  }
  .alarm-row input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .del-btn {
    background: none;
    border: 1px solid rgba(239,83,80,0.22);
    border-radius: 3px;
    color: rgba(239,83,80,0.4);
    font-size: 14px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .del-btn:hover { border-color: var(--alarm-red-light); color: var(--alarm-red-light); background: rgba(239,83,80,0.08); }

  #add-btn {
    width: 100%;
    padding: 11px;
    background: transparent;
    border: 1px dashed var(--accent-dim);
    border-radius: 4px;
    color: var(--accent-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.2s;
  }
  #add-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(79,195,247,0.05); }
  #add-btn:disabled { opacity: 0.28; cursor: not-allowed; }

  #limit-note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 8px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<button id="gear-btn" aria-label="設定を開く" title="アラーム設定">⚙</button>

<div id="clock-wrap">
  <div id="time-display">00:00:00</div>
  <div id="date-display">---</div>
  <div id="alarm-tags"></div>
  <button id="stop-btn">■ STOP ALARM</button>
</div>

<div id="overlay" role="dialog" aria-modal="true" aria-label="アラーム設定">
  <div id="settings-panel">
    <div id="panel-title">▸ ALARM SETTINGS</div>
    <button id="close-btn" aria-label="閉じる">✕</button>
    <div id="alarm-list"></div>
    <button id="add-btn">＋ アラームを追加</button>
    <div id="limit-note"></div>
  </div>
</div>

<script>
(function() {
  const MAX = 8;
  const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  let alarms = [{ id: 1, time: '10:20', enabled: true }];
  let nextId = 2;
  let firingIds = new Set();
  let stoppedIds = new Set(); // 手動停止済み（同分内は再発火しない）
  let audioCtx = null;
  let beepTimer = null;
  let alarmActive = false;

  const body = document.body;
  const display = document.getElementById('time-display');
  const dateEl = document.getElementById('date-display');
  const tagsEl = document.getElementById('alarm-tags');
  const stopBtn = document.getElementById('stop-btn');
  const gearBtn = document.getElementById('gear-btn');
  const overlay = document.getElementById('overlay');
  const alarmList = document.getElementById('alarm-list');
  const addBtn = document.getElementById('add-btn');
  const limitNote = document.getElementById('limit-note');

  function pad(n) { return String(n).padStart(2,'0'); }

  function tick() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    display.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
    const d = now.getDay(), mo = now.getMonth(), da = now.getDate();
    dateEl.textContent = DAYS[d] + '  ' + MONTHS[mo] + ' ' + pad(da);

    const hhmm = pad(h) + ':' + pad(m);
    let newFire = false;
    alarms.forEach(a => {
      if (a.enabled && a.time === hhmm && !firingIds.has(a.id) && !stoppedIds.has(a.id)) {
        firingIds.add(a.id); newFire = true;
      }
    });
    if (newFire && !alarmActive) startAlarm();

    // 分が変わったアラームはfiringIds・stoppedIdsから除去
    firingIds.forEach(id => {
      const a = alarms.find(x => x.id === id);
      if (!a || a.time !== hhmm) firingIds.delete(id);
    });
    stoppedIds.forEach(id => {
      const a = alarms.find(x => x.id === id);
      if (!a || a.time !== hhmm) stoppedIds.delete(id);
    });
    if (firingIds.size === 0 && alarmActive) stopAlarm(true);

    renderTags();
  }

  function startAlarm() {
    alarmActive = true;
    body.classList.add('alarm-on');
    stopBtn.classList.add('active');
    stopBtn.classList.remove('stopped');
    doBeep();
  }

  function stopAlarm(auto) {
    alarmActive = false;
    clearTimeout(beepTimer);
    beepTimer = null;
    if (audioCtx) {
      try { audioCtx.close(); } catch(e) {}
      audioCtx = null;
    }
    body.classList.remove('alarm-on');
    stopBtn.classList.remove('active');
    if (!auto) { stopBtn.classList.add('stopped'); setTimeout(() => stopBtn.classList.remove('stopped'), 3000); }
  }

  function doBeep() {
    if (!alarmActive) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(660, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.24);
      g.gain.setValueAtTime(0.28, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      osc.connect(g); g.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.55);
      osc.onended = () => {
        if (!alarmActive) return;
        beepTimer = setTimeout(doBeep, 350);
      };
    } catch(e) {}
  }

  stopBtn.addEventListener('click', () => {
    if (!stopBtn.classList.contains('active')) return;
    firingIds.forEach(id => stoppedIds.add(id));
    firingIds.clear();
    stopAlarm(false);
  });

  function renderTags() {
    tagsEl.innerHTML = '';
    const now = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes();

    const sorted = alarms
      .filter(a => a.enabled)
      .slice()
      .sort((a, b) => {
        const [ah, am] = a.time.split(':').map(Number);
        const [bh, bm] = b.time.split(':').map(Number);
        const am2 = ah * 60 + am;
        const bm2 = bh * 60 + bm;
        // 現在時刻以降を前に、それ以前を後ろに（翌日扱い）
        const aOff = am2 >= nowMins ? am2 : am2 + 1440;
        const bOff = bm2 >= nowMins ? bm2 : bm2 + 1440;
        return aOff - bOff;
      });

    sorted.forEach(a => {
      const t = document.createElement('span');
      t.className = 'alarm-tag' + (firingIds.has(a.id) ? ' firing' : '');
      t.textContent = '🔔 ' + a.time;
      tagsEl.appendChild(t);
    });
  }

  gearBtn.addEventListener('click', () => { overlay.classList.add('open'); renderList(); });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  document.getElementById('close-btn').addEventListener('click', () => overlay.classList.remove('open'));

  function renderList() {
    alarmList.innerHTML = '';
    alarms.forEach(a => {
      const row = document.createElement('div');
      row.className = 'alarm-row';

      const inp = document.createElement('input');
      inp.type = 'time';
      inp.value = a.time;
      inp.addEventListener('change', () => { a.time = inp.value; firingIds.delete(a.id); renderTags(); });

      const uid = 'chk-' + a.id;
      const chk = document.createElement('input');
      chk.type = 'checkbox'; chk.id = uid; chk.checked = a.enabled;
      chk.addEventListener('change', () => { a.enabled = chk.checked; if (!a.enabled) firingIds.delete(a.id); renderTags(); });

      const lbl = document.createElement('label');
      lbl.htmlFor = uid;
      lbl.appendChild(chk);
      lbl.append(' ON');

      const del = document.createElement('button');
      del.className = 'del-btn'; del.title = '削除'; del.textContent = '✕';
      del.addEventListener('click', () => {
        alarms = alarms.filter(x => x.id !== a.id);
        firingIds.delete(a.id);
        renderList(); renderTags();
      });

      row.appendChild(inp); row.appendChild(lbl); row.appendChild(del);
      alarmList.appendChild(row);
    });

    addBtn.disabled = alarms.length >= MAX;
    limitNote.textContent = alarms.length + ' / ' + MAX;
  }

  addBtn.addEventListener('click', () => {
    if (alarms.length >= MAX) return;
    alarms.push({ id: nextId++, time: '07:00', enabled: true });
    renderList(); renderTags();
    alarmList.scrollTop = alarmList.scrollHeight;
  });

  // 浮遊する光の粒
  (function() {
    const COLORS = [
      'rgba(79,195,247,VAL)',   // 水色
      'rgba(255,238,100,VAL)',  // 蛍光イエロー
      'rgba(255,255,255,VAL)',  // 白
      'rgba(180,220,255,VAL)',  // 薄青
    ];
    const COUNT = 28;

    for (let i = 0; i < COUNT; i++) {
      const p = document.createElement('div');
      p.className = 'particle';

      const size = 3 + Math.random() * 4.5;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const dur = 8 + Math.random() * 14;
      const delay = -(Math.random() * dur);
      const tx = (Math.random() - 0.5) * 80;
      const ty = -(40 + Math.random() * 80);
      const col = COLORS[Math.floor(Math.random() * COLORS.length)];
      const alpha = 0.4 + Math.random() * 0.5;

      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${x}vw;
        top: ${y}vh;
        background: ${col.replace('VAL', alpha)};
        box-shadow: 0 0 ${size * 2}px ${col.replace('VAL', alpha * 0.8)};
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        --tx: ${tx}px;
        --ty: ${ty}px;
      `;
      document.body.appendChild(p);
    }
  })();

  // 流れ星
  (function() {
    function launchStar() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const angleDeg = 125 + Math.random() * 30;
      const dist = vw * (0.45 + Math.random() * 0.35);
      const tailLen = 80 + Math.random() * 80;
      const duration = 900 + Math.random() * 600;

      const startX = vw * 0.45 + Math.random() * vw * 0.5;
      const startY = Math.random() * vh * 0.45;

      // outer: 開始位置に固定 + rotate で進行方向を決める
      const outer = document.createElement('div');
      outer.className = 'star-outer';
      outer.style.cssText = `
        left: ${startX}px;
        top: ${startY}px;
        transform: rotate(${angleDeg}deg);
      `;

      // inner: outer内でX軸方向にtranslate（rotateで斜めになる）
      const inner = document.createElement('div');
      inner.className = 'star-inner';
      inner.style.cssText = `
        --dist: ${dist}px;
        --tail-len: ${tailLen}px;
        animation-duration: ${duration}ms;
      `;

      outer.appendChild(inner);
      document.body.appendChild(outer);
      setTimeout(() => outer.remove(), duration + 100);
    }

    function schedule() {
      launchStar();
      if (Math.random() < 0.2) {
        setTimeout(launchStar, 300 + Math.random() * 400);
      }
      setTimeout(schedule, 10000 + Math.random() * 20000);
    }
    setTimeout(schedule, 2000 + Math.random() * 3000);
  })();

  renderTags(); tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
